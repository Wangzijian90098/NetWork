<h2>落地页设计方案 — 导航栏</h2>
<p class="subtitle">选择你喜欢的导航栏布局风格</p>

<div class="options">
  <div class="option" data-choice="nav-a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简洁型</h3>
      <p>Logo + 四个导航 + 登录/注册按钮，单行平铺，宽度留白充足</p>
    </div>
  </div>
  <div class="option" data-choice="nav-b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>紧凑型</h3>
      <p>Logo + 导航 + 用户头像/公告图标组合，右侧操作区更丰富</p>
    </div>
  </div>
  <div class="option" data-choice="nav-c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>透明毛玻璃型</h3>
      <p>滚动时背景变为磨砂玻璃效果，导航与内容融合感更强</p>
    </div>
  </div>
</div>
