<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Keys - AI API Hub</title>
  <link rel="stylesheet" href="./assets/console.css" />
</head>
<body>
  <div class="console-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-badge">AI</span>
        <span>AI API Hub</span>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="./dashboard.html">概览</a>
        <a class="sidebar-link active" href="./api-keys.html">API Keys</a>
        <a class="sidebar-link" href="./landing.html">返回官网</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-title">
          <h1>API Key 管理</h1>
          <p>创建、查看和撤销访问密钥。</p>
        </div>
        <div class="actions">
          <button class="btn-primary" id="createKeyBtn">创建新 Key</button>
          <button class="btn-secondary" onclick="logout()">退出登录</button>
        </div>
      </header>

      <section class="card panel">
        <h2>当前密钥</h2>
        <div class="key-list" id="keyList"></div>
      </section>
    </main>
  </div>

  <script src="./assets/api.js"></script>
  <script>
    async function loadKeys() {
      try {
        const keys = await getKeys();
        renderKeys(keys);
      } catch (err) {
        if (err.message.includes('Unauthorized')) return;  // 已跳转
        document.getElementById('keyList').innerHTML =
          '<p style="color:red;">加载失败：' + err.message + '</p>';
      }
    }

    function renderKeys(keys) {
      const root = document.getElementById('keyList');
      if (!keys || keys.length === 0) {
        root.innerHTML = '<p class="inline-note">暂无 API Key，点击上方按钮创建。</p>';
        return;
      }
      root.innerHTML = keys.map(item => `
        <div class="key-row">
          <div class="key-meta">
            <h3>${item.key_name || item.name || 'Unnamed Key'}</h3>
            <p>${maskToken(item.token)} · ${item.status} · ${item.created_at || item.createdAt || ''}</p>
          </div>
          <div class="key-actions">
            <span class="tag">${item.status}</span>
            <button class="btn-secondary" data-copy="${item.token}">复制</button>
            ${item.status === 'active' ? `<button class="btn-danger" data-revoke="${item.id}">撤销</button>` : ''}
          </div>
        </div>
      `).join('');

      root.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.dataset.copy);
          btn.textContent = '已复制';
          setTimeout(() => { btn.textContent = '复制'; }, 1200);
        });
      });

      root.querySelectorAll('[data-revoke]').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await revokeKey(btn.dataset.revoke);
            loadKeys();
          } catch (err) {
            alert('撤销失败：' + err.message);
          }
        });
      });
    }

    document.getElementById('createKeyBtn').addEventListener('click', async () => {
      try {
        await createKey('New Key');
        loadKeys();
      } catch (err) {
        alert('创建失败：' + err.message);
      }
    });

    loadKeys();
  </script>
</body>
</html>
