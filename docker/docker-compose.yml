version: '3.8'

services:
  backend:
    image: calciumion/new-api:latest
    container_name: network-ai-backend
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    environment:
      - AppID=network-ai
      - AppKey=${APP_KEY}
      - MasterKey=${MASTER_KEY}
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - SessionSecret=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - InitialQuota=1000000
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - postgres
    networks:
      - network-ai-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: network-ai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - network-ai-network

  redis:
    image: redis:7-alpine
    container_name: network-ai-redis
    restart: always
    networks:
      - network-ai-network

  postgres:
    image: postgres:15
    container_name: network-ai-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - network-ai-network

volumes:
  pg_data:

networks:
  network-ai-network:
    driver: bridge
