version: '3.8'

services:
  # Java Spring Boot 后端
  backend:
    build:
      context: ../java-backend
      dockerfile: Dockerfile
    container_name: network-ai-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/aihub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - TZ=Asia/Shanghai
    volumes:
      - ../java-backend/src/main/resources:/app/config
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - network-ai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # React 前端
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: network-ai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - network-ai-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: network-ai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: aihub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - network-ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  network-ai-network:
    driver: bridge
