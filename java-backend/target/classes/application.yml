server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aihub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  jwt:
    secret: aihub-jwt-secret-key-for-signing-tokens-must-be-at-least-256-bits-long
    expiration-ms: 86400000  # 24 hours in milliseconds
